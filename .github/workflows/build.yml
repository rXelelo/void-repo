name: Build and publish packages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-linux:latest-full-x86_64
      options: --privileged

    steps:
      - name: Install base dependencies
        run: |
          xbps-install -Syu xbps
          xbps-install -yu
          xbps-install -y git libstdc++ tar curl xtools

      - uses: actions/checkout@v4

      - name: Setup void-packages
        run: |
          useradd -m builder
          groupadd xbuilder || true
          usermod -aG xbuilder builder
          git clone --depth=1 https://github.com/void-linux/void-packages /home/builder/void-packages
          cp -r srcpkgs/* /home/builder/void-packages/srcpkgs/
          cat >> /home/builder/void-packages/etc/conf << 'EOF'
          XBPS_ALLOW_CHROOT_BREAKOUT=yes
          XBPS_CHROOT_CMD=ethereal
          XBPS_MASTERDIR=/home/builder/void-packages/masterdir
          EOF
          chown -R builder:builder /home/builder/void-packages

      - name: Bootstrap
        run: |
          su builder -c "cd /home/builder/void-packages && ./xbps-src binary-bootstrap"
          touch /home/builder/void-packages/masterdir/.xbps_chroot_init
          chown builder:builder /home/builder/void-packages/masterdir/.xbps_chroot_init

      - name: Debug
        run: |
          ls -la /home/builder/void-packages/masterdir/
          cat /home/builder/void-packages/masterdir/.xbps_chroot_init 2>/dev/null || echo "no init file"

      - name: Build noctalia-qs
        run: su builder -c "cd /home/builder/void-packages && ./xbps-src pkg noctalia-qs"

      - name: Build noctalia-shell
        run: su builder -c "cd /home/builder/void-packages && ./xbps-src pkg noctalia-shell"

      - name: Sign and index repo
        run: |
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/privkey.pem
          chmod 600 /tmp/privkey.pem
          xbps-rindex -a /home/builder/void-packages/hostdir/binpkgs/*.xbps
          xbps-rindex --sign --signedby "Rain Xelelo" \
            --privkey /tmp/privkey.pem /home/builder/void-packages/hostdir/binpkgs
          rm /tmp/privkey.pem

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /home/builder/void-packages/hostdir/binpkgs
