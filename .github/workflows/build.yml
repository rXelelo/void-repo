name: Build and publish packages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-linux:latest-full-x86_64

    steps:
      - name: Install base dependencies
        run: |
          xbps-install -Syu xbps
          xbps-install -yu
          xbps-install -y git libstdc++ tar curl xtools

      - uses: actions/checkout@v4

      - name: Setup void-packages
        run: |
          useradd -m builder
          git clone --depth=1 https://github.com/void-linux/void-packages
          cp -r srcpkgs/* void-packages/srcpkgs/
          chown -R builder:builder void-packages
          su builder -c "cd void-packages && ./xbps-src binary-bootstrap"

      - name: Build packages
        run: |
          su builder -c "cd void-packages && ./xbps-src pkg noctalia-qs"
          su builder -c "cd void-packages && ./xbps-src pkg noctalia-shell"

      - name: Sign and index repo
        env:
          PRIVATE_KEY: ${{ secrets.XBPS_PRIVATE_KEY }}
        run: |
          echo "$PRIVATE_KEY" > /tmp/privkey.pem
          chmod 600 /tmp/privkey.pem
          cd void-packages
          xbps-rindex -a hostdir/binpkgs/*.xbps
          xbps-rindex --sign --signedby "Rain Xelelo" \
            --privkey /tmp/privkey.pem hostdir/binpkgs
          rm /tmp/privkey.pem

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: void-packages/hostdir/binpkgs
