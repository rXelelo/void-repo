name: Build and publish packages
on:
  push:
    branches: [main]
    paths:
      - 'srcpkgs/**'
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ghcr.io/void-linux/void-glibc-full
      options: --privileged
      volumes:
        - /dev:/dev
    outputs:
      updated_packages: ${{ steps.autoupdate.outputs.updated_packages }}
      has_updates: ${{ steps.autoupdate.outputs.has_updates }}
    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps && xbps-install -yu
          xbps-install -y sudo bash curl git libstdc++
          useradd -G xbuilder -M builder

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup void-packages
        run: |
          git clone --depth=1 https://github.com/void-linux/void-packages
          cp -r srcpkgs/* void-packages/srcpkgs/
          chown -R builder:builder void-packages

      - name: Prepare masterdir
        run: |
          cd void-packages
          echo XBPS_BUILD_ENVIRONMENT=void-packages-ci >> etc/conf
          echo XBPS_CHROOT_CMD=uchroot >> etc/conf
          echo XBPS_ALLOW_RESTRICTED=yes >> etc/conf
          sudo -Eu builder ./xbps-src binary-bootstrap && ./xbps-src install curl
          
      - name: Check and apply updates
        id: autoupdate
        run: |
          xbps-install -y xtools
          UPDATED=""
          for pkg in $(ls srcpkgs/); do
            echo "=> Checking $pkg..."

            # Get latest version only (tail -1 handles multiple version lines)
            UPDATE=$(sudo -Eu builder sh -c "cd void-packages && ./xbps-src update-check $pkg 2>/dev/null" | tail -1 || true)
            echo "$UPDATE" | grep -q ' -> ' || continue

            OLD_VER=$(echo "$UPDATE" | awk -F' -> ' '{print $1}' | rev | cut -d- -f1 | rev)
            NEW_VER=$(echo "$UPDATE" | awk -F' -> ' '{print $2}' | rev | cut -d- -f1 | rev | tr -d '\n\r')

            [ -z "$NEW_VER" ] || [ "$OLD_VER" = "$NEW_VER" ] && continue

            echo "=> $pkg: $OLD_VER -> $NEW_VER"

            # Update version and reset revision
            sed -i "s|^version=.*|version=${NEW_VER}|" srcpkgs/$pkg/template
            sed -i "s|^revision=.*|revision=0|" srcpkgs/$pkg/template

            # Sync into void-packages and update checksum
            cp srcpkgs/$pkg/template void-packages/srcpkgs/$pkg/template
            chown builder:builder void-packages/srcpkgs/$pkg/template

            if sudo -Eu builder sh -c "cd void-packages && xgensum -i srcpkgs/$pkg/template"; then
              cp void-packages/srcpkgs/$pkg/template srcpkgs/$pkg/template
              echo "=> $pkg checksum updated"
              UPDATED="$UPDATED $pkg"
            else
              echo "=> WARNING: checksum failed for $pkg, skipping"
              git checkout -- srcpkgs/$pkg/template
            fi
          done

          UPDATED=$(echo $UPDATED | xargs)
          if [ -n "$UPDATED" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "updated_packages=$UPDATED" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "updated_packages=" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated templates
        if: steps.autoupdate.outputs.has_updates == 'true'
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add srcpkgs/
          git commit -m "auto-update: ${{ steps.autoupdate.outputs.updated_packages }}"
          git push

  build:
    runs-on: ubuntu-latest
    needs: update
    if: |
      always() && (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        needs.update.outputs.has_updates == 'true'
      )
    permissions:
      contents: write
    container:
      image: ghcr.io/void-linux/void-glibc-full
      options: --privileged
      volumes:
        - /dev:/dev
    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps && xbps-install -yu
          xbps-install -y sudo bash curl git libstdc++
          useradd -G xbuilder -M builder

      - name: Checkout
        uses: classabbyamp/treeless-checkout-action@v1

      - name: Find changed packages
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "packages=$(ls srcpkgs/ | tr '\n' ' ')" >> $GITHUB_OUTPUT
          elif [ -n "${{ needs.update.outputs.updated_packages }}" ]; then
            echo "packages=${{ needs.update.outputs.updated_packages }}" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              | grep '^srcpkgs/' \
              | cut -d'/' -f2 \
              | sort -u \
              | tr '\n' ' ')
            echo "packages=$CHANGED" >> $GITHUB_OUTPUT
          fi
          echo "Changed packages: $(cat $GITHUB_OUTPUT | grep packages)"

      - name: Setup void-packages
        run: |
          git clone --depth=1 https://github.com/void-linux/void-packages
          cp -r srcpkgs/* void-packages/srcpkgs/
          chown -R builder:builder void-packages

      - name: Prepare masterdir
        run: |
          cd void-packages
          echo XBPS_BUILD_ENVIRONMENT=void-packages-ci >> etc/conf
          echo XBPS_CHROOT_CMD=uchroot >> etc/conf
          echo XBPS_ALLOW_RESTRICTED=yes >> etc/conf
          sudo -Eu builder ./xbps-src binary-bootstrap

      - name: Build changed packages
        run: |
          for pkg in ${{ steps.changed.outputs.packages }}; do
            echo "=> Building $pkg"
            sudo -Eu builder sh -c "cd void-packages && ./xbps-src pkg $pkg"
          done

      - name: Sign and index repo
        run: |
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/privkey.pem
          openssl rsa -in /tmp/privkey.pem -out /tmp/privkey_rsa.pem
          xbps-rindex --sign-pkg --signedby "Rain Xelelo" \
            --privkey /tmp/privkey_rsa.pem void-packages/hostdir/binpkgs/*.xbps
          xbps-rindex -a void-packages/hostdir/binpkgs/*.xbps
          xbps-rindex --sign --signedby "Rain Xelelo" \
            --privkey /tmp/privkey_rsa.pem void-packages/hostdir/binpkgs
          rm /tmp/privkey.pem /tmp/privkey_rsa.pem
          mkdir -p $GITHUB_WORKSPACE/repo
          cp void-packages/hostdir/binpkgs/* $GITHUB_WORKSPACE/repo/

      - name: Merge with existing repo and clean old versions
        run: |
          REPO_DIR="/__w/noctalia-void-repo/noctalia-void-repo/repo"
          mkdir -p $REPO_DIR

          # Fetch existing gh-pages packages
          git fetch origin gh-pages 2>/dev/null || true
          mkdir -p /tmp/existing-repo
          git --work-tree=/tmp/existing-repo checkout origin/gh-pages -- . 2>/dev/null || true
          cp /tmp/existing-repo/*.xbps $REPO_DIR/ 2>/dev/null || true
          cp /tmp/existing-repo/*.sig2 $REPO_DIR/ 2>/dev/null || true

          # Clean old versions
          cd $REPO_DIR
          for pkg in $(ls *.xbps 2>/dev/null | sed 's/-[0-9].*//' | sort -u); do
            LATEST=$(ls ${pkg}-*.xbps 2>/dev/null | sort -V | tail -1)
            for file in ${pkg}-*.xbps; do
              [ "$file" = "$LATEST" ] && continue
              echo "=> Removing old: $file"
              rm -f "$file" "${file}.sig2"
            done
          done

          # Re-index
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/privkey.pem
          openssl rsa -in /tmp/privkey.pem -out /tmp/privkey_rsa.pem
          xbps-rindex -a *.xbps
          xbps-rindex --sign --signedby "Rain Xelelo" \
            --privkey /tmp/privkey_rsa.pem .
          rm /tmp/privkey.pem /tmp/privkey_rsa.pem

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          keep_files: false
